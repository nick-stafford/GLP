apiVersion: apps/v1
kind: Deployment
metadata:
  name: glp-api
  labels:
    app: glp-api
    version: v2.4.1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: glp-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: glp-api
    spec:
      containers:
        - name: glp-api
          image: gcr.io/glp-prod/app:v2.4.1
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: glp-api-svc
spec:
  selector:
    app: glp-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glp-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - app.glp-prod.io
      secretName: glp-tls
  rules:
    - host: app.glp-prod.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glp-api-svc
                port:
                  number: 80
